<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Peely Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1 id="score">0</h1>

  <div id="game">
    <!-- 4 Hintergrund-Divs: normal, gespiegelt, normal, gespiegelt -->
    <div id="bg">
      <div class="bg-slice normal"></div>
      <div class="bg-slice mirror"></div>
      <div class="bg-slice normal"></div>
      <div class="bg-slice mirror"></div>
    </div>
    <div id="peely"></div>
    <div id="biggie"></div>
  </div>

  <button id="start-btn">Start</button>

  <script src="script.js"></script>
</body>
</html>
